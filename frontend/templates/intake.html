<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Request Appointment</title>

    <style>

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgb(245, 245, 220);
    }

    main{
      width: 320px;
    }

    label,
    input{
      display: block;
      margin-bottom: 10px;
    }
    
  </style>
  
</head>

  
<body>
    <main>
        <p id="form-message"></p>

        <form id="intake-form" action="/api/intake" method="POST">
            <label for="full_name">Full Name</label>
            <input type="text" name="full_name" id="full_name">

            <label for="email">Email</label>
            <input type="text" name="email" id="email">

            <label for="phone">Phone Number</label>
            <input type="text" name="phone" id="phone">

            <label for="notes">Additional Notes</label>
            <input type="text" name="notes" id="notes">

            <label for="date_time">Preferred Date & Time</label>
            <input type="datetime-local" name="date_time" id="date_time">

            <button type="submit">Submit Request</button>

        </form>

        <script>
          document.getElementById("intake-form").addEventListener("submit", function(event){
            event.preventDefault();

            const form = event.target;
            const formData = new FormData(form);
            const mess = document.getElementById("form-message");

            fetch(form.action, {
              method: "POST",
              body: formData
            })

            .then(function(response){
              return response.json().then(function(data) {
                return {
                    ok: response.ok,
                    data: data
                };
              });
            })

            .then(function(result) {
                if (result.ok) {
                  mess.style.color = "green";
                  mess.innerText = result.data.message || "Appointment request submitted successfully. Returning to calendar...";

                  setTimeout(function() {
                      window.location.href = "/";
                  }, 1500);
                } 
                else {
                  mess.style.color = "red";
                  mess.innerText = result.data.message || "Invalid input, try again.";
                }
            })
            
            .catch(function(error) {
              mess.style.color = "red";
              mess.innerText = "Something went wrong. Please try again.";
              console.error(error);
            });
          })
        </script>
    </main>
</body>
</html>
